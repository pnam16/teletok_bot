services:
  teletok:
    build: .
    container_name: teletok-bot
    restart: unless-stopped
    depends_on:
      - telegram-api
    env_file:
      - .env
    environment:
      # Override DATA_DIR so video cache is written inside container path that we mount to host
      DATA_DIR: /app/data
      # Point bot to self-hosted Telegram Bot API (see telegram-api service below)
      TELEGRAM_API_BASE: http://telegram-bot-api:8090
      # Raise Telegram video limit when using local Bot API (official server: 50MB, local: up to ~2000MB)
      TELEGRAM_MAX_VIDEO_MB: 2000
    volumes:
      - "${DATA_DIR:-./data}:/app/data"
    # If you need to inspect logs or attach a shell:
    # command: ["node", "src/index.js"]

  telegram-api:
    image: aiogram/telegram-bot-api:latest
    container_name: telegram-bot-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "1"
      TELEGRAM_HTTP_PORT: "8090"
    ports:
      # Expose only on localhost by default; adjust if you need remote access
      - "127.0.0.1:8090:8090"
    volumes:
      - "./dist/telegram-bot-api-data:/var/lib/telegram-bot-api"
